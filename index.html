<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My CineLux </title>
  </head>
  <body>
    <!-- Premium Cinematic 3D Background Wrapper -->
    <div class="cinematic-bg-container">
      <!-- Ambient Glow Blobs -->
      <div class="glow-blob glow-blue"></div>
      <div class="glow-blob glow-emerald"></div>
      <div class="glow-blob glow-center"></div>
      
      <!-- Volumetric Light Beams -->
      <div class="light-beam beam-1"></div>
      <div class="light-beam beam-2"></div>
      
      <!-- High-Performance Interactive Spider-Web Particle Canvas -->
      <canvas id="spiderweb-canvas" class="spiderweb-canvas-el"></canvas>
      
      <!-- Soft Cinematic Fog / Volumetric Mist Layer -->
      <div class="cinematic-fog"></div>
      
      <!-- Elegant Abstract 3D Glass Shapes -->
      <div class="glass-shape glass-top-left"></div>
      <div class="glass-shape glass-top-right"></div>
      <div class="glass-shape glass-bottom-left"></div>
      <div class="glass-shape glass-bottom-right"></div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Vanilla high-performance script for spider-web background -->
    <script>
      (function() {
        const canvas = document.getElementById('spiderweb-canvas');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        if (!ctx) return;

        let width = window.innerWidth;
        let height = window.innerHeight;
        let dpr = window.devicePixelRatio || 1;

        // Parallax smooth targets
        let targetX = 0;
        let targetY = 0;
        let currentX = 0;
        let currentY = 0;
        const ease = 0.04; // Extremely organic fluid easing

        let particleCount = Math.min(110, Math.max(50, Math.floor((width * height) / 13000)));
        let particles = [];
        const maxDistance = 125;

        // Motion reduction media query
        let isMotionReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        const motionQuery = window.matchMedia('(prefers-reduced-motion: reduce)');
        if (motionQuery.addEventListener) {
          motionQuery.addEventListener('change', function(e) { isMotionReduced = e.matches; });
        }

        class Particle {
          constructor() {
            this.reset(true);
          }

          reset(initial = false) {
            this.x = Math.random() * width;
            this.y = Math.random() * height;
            
            // Generate elegant slow drift
            const angle = Math.random() * Math.PI * 2;
            const speed = 0.12 + Math.random() * 0.23;
            this.vx = Math.cos(angle) * speed;
            this.vy = Math.sin(angle) * speed;
            
            this.radius = 0.95 + Math.random() * 1.35;
            
            const colors = [
              'rgba(99, 102, 241, 0.75)', // Indigo
              'rgba(59, 130, 246, 0.75)',  // Cyber Blue
              'rgba(168, 85, 247, 0.7)',   // Premium Purple
              'rgba(16, 185, 129, 0.65)'   // Emerald Highlight
            ];
            this.color = colors[Math.floor(Math.random() * colors.length)];
          }

          update() {
            if (!isMotionReduced) {
              this.x += this.vx;
              this.y += this.vy;

              // Soft screen edge rebound
              if (this.x < 0 || this.x > width) this.vx *= -1;
              if (this.y < 0 || this.y > height) this.vy *= -1;
            }
          }

          draw(offsetX, offsetY) {
            ctx.beginPath();
            // Scale offset per particle size to simulate 3D depth parallax
            const drawX = this.x + offsetX * (this.radius * 1.4);
            const drawY = this.y + offsetY * (this.radius * 1.4);

            ctx.arc(drawX, drawY, this.radius, 0, Math.PI * 2);
            ctx.fillStyle = this.color;
            ctx.fill();
          }
        }

        function init() {
          width = window.innerWidth;
          height = window.innerHeight;
          dpr = window.devicePixelRatio || 1;

          canvas.width = width * dpr;
          canvas.height = height * dpr;
          canvas.style.width = width + 'px';
          canvas.style.height = height + 'px';
          ctx.scale(dpr, dpr);

          particleCount = Math.min(110, Math.max(50, Math.floor((width * height) / 13000)));
          particles = [];
          for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle());
          }
        }

        // Precise Resize Observer to prevent pixel stretch/blur
        const observer = new ResizeObserver(function(entries) {
          for (let entry of entries) {
            init();
          }
        });
        observer.observe(canvas.parentElement || document.body);

        function handlePointer(clientX, clientY) {
          targetX = (clientX - width / 2) / (width / 2);
          targetY = (clientY - height / 2) / (height / 2);
        }

        window.addEventListener('mousemove', function(e) {
          handlePointer(e.clientX, e.clientY);
        });

        window.addEventListener('touchmove', function(e) {
          if (e.touches.length > 0) {
            handlePointer(e.touches[0].clientX, e.touches[0].clientY);
          }
        }, { passive: true });

        window.addEventListener('mouseleave', function() {
          targetX = 0;
          targetY = 0;
        });

        function drawConnections(offsetX, offsetY) {
          ctx.shadowBlur = 0; // High performance drawing
          for (let i = 0; i < particles.length; i++) {
            const p1 = particles[i];
            const p1DrawX = p1.x + offsetX * (p1.radius * 1.4);
            const p1DrawY = p1.y + offsetY * (p1.radius * 1.4);

            for (let j = i + 1; j < particles.length; j++) {
              const p2 = particles[j];
              const p2DrawX = p2.x + offsetX * (p2.radius * 1.4);
              const p2DrawY = p2.y + offsetY * (p2.radius * 1.4);

              const dx = p1DrawX - p2DrawX;
              const dy = p1DrawY - p2DrawY;
              const dist = Math.sqrt(dx * dx + dy * dy);

              if (dist < maxDistance) {
                const alpha = (1 - dist / maxDistance) * 0.16;
                ctx.beginPath();
                ctx.moveTo(p1DrawX, p1DrawY);
                ctx.lineTo(p2DrawX, p2DrawY);
                
                // Color-matching gradient stream between nodes
                const gradient = ctx.createLinearGradient(p1DrawX, p1DrawY, p2DrawX, p2DrawY);
                const c1 = p1.color.replace('0.75', alpha.toString()).replace('0.7', alpha.toString()).replace('0.65', alpha.toString());
                const c2 = p2.color.replace('0.75', alpha.toString()).replace('0.7', alpha.toString()).replace('0.65', alpha.toString());
                gradient.addColorStop(0, c1);
                gradient.addColorStop(1, c2);
                
                ctx.strokeStyle = gradient;
                ctx.lineWidth = (1 - dist / maxDistance) * 0.75;
                ctx.stroke();
              }
            }
          }
        }

        function animate() {
          ctx.clearRect(0, 0, width, height);

          // Eased linear interpolation for buttery parallax movement
          currentX += (targetX - currentX) * ease;
          currentY += (targetY - currentY) * ease;

          const offsetX = currentX * 10;
          const offsetY = currentY * 10;

          drawConnections(offsetX, offsetY);

          for (let i = 0; i < particles.length; i++) {
            particles[i].update();
            particles[i].draw(offsetX, offsetY);
          }

          requestAnimationFrame(animate);
        }

        init();
        animate();
      })();
    </script>
  </body>
</html>
